<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğitici Oyun - Soru 5</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
    <div class="background"></div>

    <a href="yorum4.html" class="back-btn">Geri Dön</a>
    <div id="scoreboard" class="scoreboard">Skor: 0</div>

    <div id="feedbackOverlay" class="feedback-overlay"></div>

    <div class="speech-bubble">
        Amcasıyla ticaret yaparken veya kendi mallarını satarken asla hile yapmaz, eğer malın bir kusuru varsa bunu
        alıcıya açıkça söylerdi.
        <br><br><span style="font-size: 16px; color: #555;"><i>Sence bu durumu en iyi hangi emoji/emojiler anlatır?</i></span>
    </div>

    <div class="emoji-container">
        <div class="emoji" onclick="checkAnswer('💔')">💔</div>
        <div class="emoji" onclick="checkAnswer('😊')">😊</div>
        <div class="emoji" onclick="checkAnswer('🐑')">🐑</div>
        <div class="emoji" onclick="checkAnswer('❌')">❌</div>
        <div class="emoji" onclick="checkAnswer('✅')">✅</div>
        <div class="emoji" onclick="checkAnswer('⚖️')">⚖️</div>
        <div class="emoji" onclick="checkAnswer('🎁')">🎁</div>
        <div class="emoji" onclick="checkAnswer('❤️')">❤️</div>
        <div class="emoji" onclick="checkAnswer('😢')">😢</div>
        <div class="emoji" onclick="checkAnswer('👍🏻')">👍🏻</div>
        <div class="emoji" onclick="checkAnswer('🥱')">🥱</div>
        <div class="emoji" onclick="checkAnswer('💪🏻')">💪🏻</div>

    </div>

    <a href="yorum5.html" class="next-btn">İlerle</a>

    <script>
        let currentScore = parseInt(sessionStorage.getItem('gameScore')) || 0;
        document.getElementById('scoreboard').innerText = 'Skor: ' + currentScore;

        let selectedCorrectEmojis = new Set();

        function checkAnswer(selectedEmoji) {
            const correctEmojis = ['✅', '😊', '⚖️'];
            const nextPage = 'yorum5.html';
            const overlay = document.getElementById('feedbackOverlay');

            if (correctEmojis.includes(selectedEmoji)) {
                if (!selectedCorrectEmojis.has(selectedEmoji)) {
                    selectedCorrectEmojis.add(selectedEmoji);
                    currentScore += 10;
                    sessionStorage.setItem('gameScore', currentScore);
                    document.getElementById('scoreboard').innerText = 'Skor: ' + currentScore;

                    // Highlight the selected correct emoji to give visual feedback to user
                    const emojis = document.querySelectorAll('.emoji');
                    emojis.forEach(el => {
                        if (el.innerText === selectedEmoji) {
                            el.style.backgroundColor = 'rgba(0, 255, 0, 0.3)';
                            el.style.border = '2px solid green';
                        }
                    });
                }

                overlay.innerHTML = '✅';
                overlay.className = 'feedback-overlay correct';

                if (selectedCorrectEmojis.size === correctEmojis.length) {
                    setTimeout(() => {
                        window.location.href = nextPage;
                    }, 1000);
                } else {
                    setTimeout(() => {
                        overlay.className = 'feedback-overlay'; // hide
                    }, 800);
                }
            } else {
                overlay.innerHTML = '❌';
                overlay.className = 'feedback-overlay wrong';
                setTimeout(() => {
                    overlay.className = 'feedback-overlay'; // hide
                }, 800);
            }
        }
    </script>
</body>

</html>
